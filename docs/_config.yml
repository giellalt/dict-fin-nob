remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for Finnish ⇒ Norwegian Bokmål
description: An electronic dictionary from Finnish to Norwegian Bokmål
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: default
